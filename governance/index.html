<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DYNK Governance</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      background:
        radial-gradient(120% 80% at 50% 0%, #2A2730 0%, #0F0F11 60%);
      min-height: 100vh;
      overflow: hidden;
    }
    #root { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

    /* On mobile-sized viewports, drop the bezel and let the app fill the screen */
    @media (max-width: 500px) {
      html, body { padding: 0; margin: 0; background: #0F0F11; overflow: hidden; height: 100%; }
      /* hide the IOSDevice's own bezel chrome — let the page fill the whole viewport */
      #root > * { width: 100vw !important; height: 100dvh !important; border-radius: 0 !important; box-shadow: none !important; }
    }

    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes pop {
      0% { transform: scale(0.7); opacity: 0; }
      60% { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* iOS device frame override — make sure inner content fills */
    [data-screen-label] { height: 100%; }

    input[type="range"] { -webkit-appearance: none; height: 4px; border-radius: 999px; background: rgba(15,15,17,0.15); outline: none; }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
      background: #FF7A1A; box-shadow: 0 4px 12px rgba(255,122,26,0.45);
      cursor: pointer; border: 2px solid #fff;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data -->
  <script src="data.js"></script>

  <!-- iOS frame -->
  <script type="text/babel" src="../ios-frame.jsx"></script>

  <!-- Components -->
  <script type="text/babel" src="Shared.jsx"></script>
  <script type="text/babel" src="HubScreen.jsx"></script>
  <script type="text/babel" src="DetailScreen.jsx"></script>
  <script type="text/babel" src="ProposalActionSheet.jsx"></script>
  <script type="text/babel" src="VoteModal.jsx"></script>
  <script type="text/babel" src="SuggestScreen.jsx"></script>
  <script type="text/babel" src="ResultScreens.jsx"></script>

  <!-- App -->
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
